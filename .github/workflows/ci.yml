name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e packages/tracer-python -e 'packages/backend[dev]'
      - run: pytest packages/tracer-python packages/backend -v

  node:
    name: Node (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=@dsa-viz/trace-schema --workspace=@dsa-viz/visualizer-core
      - run: npm run test:js

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: pip install -e packages/tracer-python -e 'packages/backend[dev]'
      - run: npm ci
      - run: npm run build --workspace=@dsa-viz/trace-schema --workspace=@dsa-viz/visualizer-core
      - run: npx playwright install --with-deps chromium
        working-directory: packages/web-app
      - run: npm run test:e2e
        env:
          PYTHON: python
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-trace
          path: packages/web-app/test-results/
          retention-days: 7

  extensions:
    name: M2 extension bundles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=@dsa-viz/trace-schema --workspace=@dsa-viz/visualizer-core
      - run: npm run build --workspace=@dsa-viz/browser-extension
      - run: npm run build --workspace=dsa-visualizer-vscode
      - run: npx playwright install --with-deps chromium
        working-directory: packages/browser-extension
      - run: npx playwright test --config=packages/browser-extension/playwright.config.ts
