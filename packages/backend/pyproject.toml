[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dsa-viz-backend"
version = "0.1.0"
description = "HTTP backend that runs language tracers in a sandbox."
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "pydantic>=2.5",
    "dsa-tracer",
    "dsa-tracer-cpp",
]

[project.optional-dependencies]
dev = ["pytest>=7", "httpx>=0.27"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
