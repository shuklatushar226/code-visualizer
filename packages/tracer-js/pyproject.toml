[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dsa-tracer-js"
version = "0.1.0"
description = "JavaScript tracer for the DSA Code Visualizer (skeleton)."
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = []

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
