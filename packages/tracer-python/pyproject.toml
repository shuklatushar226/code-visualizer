[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dsa-tracer"
version = "0.1.0"
description = "Line-by-line tracer for Python programs, emitting Trace Event Protocol JSON."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "DSA Code Visualizer" }]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7", "pytest-cov"]

[project.scripts]
dsa-trace = "dsa_tracer.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
