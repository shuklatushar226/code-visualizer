[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dsa-tracer-cpp"
version = "0.1.0"
description = "C++ tracer for the DSA Code Visualizer, driven by GDB/MI."
requires-python = ">=3.9"
license = { text = "MIT" }
dependencies = [
    "pygdbmi>=0.11.0.0",
]

[project.scripts]
dsa-trace-cpp = "cpp_tracer.cli:main"

[project.optional-dependencies]
dev = ["pytest>=7"]

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
